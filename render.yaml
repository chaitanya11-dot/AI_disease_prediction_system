# render.yaml — Render Blueprint
#
# Deploy everything in one shot:
#   1. Push this repo to GitHub
#   2. Render Dashboard → New → Blueprint → pick your repo
#   3. Fill in the "sync: false" variables when prompted
#   4. After first deploy, trigger a redeploy of both services.

databases:
  - name: medisense-db
    plan: free
    databaseName: medisense
    user: medisense

services:
  # ──────────── Backend API (Flask + gunicorn) ────────────
  - type: web
    name: medisense-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python ml/train_model.py
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medisense-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CORS_ORIGINS
        # Add ALL frontend origins separated by commas (no spaces around commas)
        value: "https://ai-disease-prediction-system-fronte.vercel.app,https://ai-disease-prediction-system-fronte.vercel.app/"
      - key: FRONTEND_URL
        value: "https://ai-disease-prediction-system-fronte.vercel.app"
      - key: ADMIN_EMAIL
        sync: false                  # e.g. admin@yourdomain.com
      - key: ADMIN_PASSWORD
        sync: false                  # Choose a strong password

  # ──────────── Frontend (Vercel — deploy separately) ────────────
  # The frontend is deployed on Vercel, not Render.
  # Set VITE_API_URL in Vercel's Environment Variables dashboard:
  #   VITE_API_URL = https://medisense-backend-xixc.onrender.com/api
