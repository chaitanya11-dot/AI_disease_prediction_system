# render.yaml — Render Blueprint
#
# Deploy everything in one shot:
#   1. Push this repo to GitHub
#   2. Render Dashboard → New → Blueprint → pick your repo
#   3. Fill in the "sync: false" variables when prompted
#   4. After first deploy, update CORS_ORIGINS + FRONTEND_URL + VITE_API_URL
#      with the real URLs, then trigger a redeploy of both services.

databases:
  - name: medisense-db
    plan: free
    databaseName: medisense
    user: medisense

services:
  # ──────────── Backend API (Flask + gunicorn) ────────────
  - type: web
    name: medisense-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python ml/train_model.py
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medisense-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CORS_ORIGINS
        sync: false                  # Set to your frontend URL after first deploy
                                     # e.g. https://medisense-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false                  # Same value as CORS_ORIGINS
      - key: ADMIN_EMAIL
        sync: false                  # e.g. admin@yourdomain.com
      - key: ADMIN_PASSWORD
        sync: false                  # Choose a strong password

  # ──────────── Frontend (React static site) ────────────
  - type: web
    name: medisense-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false                  # Set to https://medisense-backend.onrender.com/api
                                     # before/after first deploy
      - key: NODE_VERSION
        value: "18.20.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html     # Required for React Router — all paths serve index.html
